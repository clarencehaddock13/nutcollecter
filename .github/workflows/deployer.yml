name: VPS Tickle & JSON Identity Audit
on:
  repository_dispatch:
    types: [tickle_deploy]

jobs:
  audit_identity:
    environment: ${{ github.event.client_payload.env_name }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Shield (Cloudflare WARP)
        run: |
          chmod +x setup_warp.sh
          sudo ./setup_warp.sh

      - name: Full JSON Identity Check
        run: |
          # Use the proxy for the audit to verify masking before deployment
          export ALL_PROXY="socks5h://127.0.0.1:40000"
          echo "Account: ${{ github.event.client_payload.env_name }}"
          echo "Run # ${{ github.event.client_payload.run_count }}"
          curl -s -H "User-Agent: ${{ github.event.client_payload.user_agent }}" https://ifconfig.me/all.json
          echo "Identity Masked via Cloudflare."

      - name: Execute Powerhouse Deployment
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          GITLAB_REPO_URL: ${{ secrets.GITLAB_REPO_URL }}
          RUN_COUNT: ${{ github.event.client_payload.run_count }}
        run: |
          # The export here ensures the powerhouse_script inherits the proxy
          export ALL_PROXY="socks5h://127.0.0.1:40000"
          chmod +x powerhouse_script.sh
          ./powerhouse_script.sh "$RENDER_API_KEY" "$GITLAB_REPO_URL" "$RUN_COUNT"
