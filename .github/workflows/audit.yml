name: VPS Tickle & JSON Identity Audit
on:
  repository_dispatch:
    types: [tickle_deploy]

jobs:
  audit_identity:
    environment: ${{ github.event.client_payload.env_name }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install and Start Cloudflare WARP
        run: |
          # 1. Install WARP logic
          curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg | sudo gpg --dearmor --yes -o /usr/share/keyrings/cloudflare-warp.gpg
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/cloudflare-warp.gpg] https://pkg.cloudflareclient.com/ $(lsb_release -sc) main" | sudo tee /etc/apt/sources.list.d/cloudflare-warp.list
          sudo apt update && sudo apt -y install cloudflare-warp

          # 2. Start Service with your bulletproof check
          if [ -d /run/systemd/system ] || pidof systemd >/dev/null; then
              sudo systemctl enable --now warp-svc >/dev/null 2>&1
          else
              sudo nohup warp-svc >/var/log/warp-svc.log 2>&1 &
              sleep 5
          fi

          # 3. Register and Connect
          warp-cli --accept-tos registration new 2>/dev/null || true
          warp-cli --accept-tos mode proxy
          warp-cli --accept-tos connect
          sleep 5

      - name: Verify SOCKS5 Proxy Proof
        run: |
          chmod +x test_socks5.sh
          ./test_socks5.sh
