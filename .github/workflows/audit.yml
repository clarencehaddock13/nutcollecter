name: Socks5 Tester
on:
  repository_dispatch:
    types: [tickle_deploy]
  workflow_dispatch: # This adds the manual "Run workflow" button in the Actions tab

jobs:
  audit_identity:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Shield
        run: |
          chmod +x setup_warp.sh
          sudo ./setup_warp.sh

      - name: Verify Proof
        run: |
          chmod +x test_socks5.sh
          ./test_socks5.sh
